<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Our Products</h1>

    <div class="cards-container">
        <div class="card">
            <img src="https://via.placeholder.com/200x150" alt="Product 1">
            <h3>Product 1</h3>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200x150" alt="Product 2">
            <h3>Product 2</h3>
            <p>Curabitur ac leo nunc. Vestibulum et mauris vel ante.</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200x150" alt="Product 3">
            <h3>Product 3</h3>
            <p>Fusce sed nisi eget sapien varius volutpat.</p>
            <button>Buy Now</button>
        </div>
    </div>
</body>
</html>
