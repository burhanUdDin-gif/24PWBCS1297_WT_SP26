<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Demo</title>
    <link rel="stylesheet" href="..\\styles\\Buttonstyling.css">
</head>
<body>
    <h1>Buttons Demo</h1>

    <div class="btn-section">
        <button class="small-blue">Small Blue</button>
        <button class="medium-green">Medium Green</button>
        <button class="large-red">Large Red</button>
        <button class="rounded-purple">Rounded Purple</button>
        <button class="circle-orange">Circle Orange</button>
        <button class="disabled-btn" disabled>Disabled</button>
    </div>
</body>
</html>
