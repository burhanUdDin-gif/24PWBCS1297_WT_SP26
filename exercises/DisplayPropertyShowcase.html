<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="..\\styles\\DisplayPropertyShowcase.css">
<title>displayDemo</title>
</head>

<body>

<div class="sectionBox">
    <h2>block inline inlineBlock</h2>

    <div class="blockBox">block element 1</div>
    <div class="blockBox">block element 2</div>

    <span class="inlineBox">inline 1</span>
    <span class="inlineBox">inline 2</span>

    <div>
        <div class="inlineBlockBox">inlineBlock 1</div>
        <div class="inlineBlockBox">inlineBlock 2</div>
    </div>
</div>

<div class="sectionBox">
    <h2>table without table tag</h2>

    <div class="tableContainer">
        <div class="tableRow">
            <div class="tableCell">name</div>
            <div class="tableCell">age</div>
            <div class="tableCell">city</div>
        </div>
        <div class="tableRow">
            <div class="tableCell">ali</div>
            <div class="tableCell">20</div>
            <div class="tableCell">peshawar</div>
        </div>
        <div class="tableRow">
            <div class="tableCell">ahmad</div>
            <div class="tableCell">22</div>
            <div class="tableCell">lahore</div>
        </div>
    </div>
</div>

<div class="sectionBox">
    <h2>hidden elements demo</h2>

    <div class="hiddenBox hideOnMobile">this is hidden on mobile</div>
    <div class="hiddenBox hideOnDesktop">this is hidden on desktop</div>
</div>

</body>
</html>
