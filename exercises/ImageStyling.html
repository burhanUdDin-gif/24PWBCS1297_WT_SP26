<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Demo</title>
    <link rel="stylesheet" href="..\\styles\\ImageStyling.css">
</head>
<body>
    <header>
        <h1>Styled Image Gallery</h1>
    </header>

    <section class="gallery">
        <div class="gallery-item">
            <img src="..\\images\\soup.jpg" alt="Sample 1" class="rounded">
            <div class="overlay">Image 1</div>
        </div>

        <div class="gallery-item">
            <img src="..\\images\\soup2.avif" alt="Sample 2" class="circle">
            <div class="overlay">Image 2</div>
        </div>

        <div class="gallery-item">
            <img src="..\\images\\soup3.jpg" alt="Sample 3" class="rounded shadow">
            <div class="overlay">Image 3</div>
        </div>

        <div class="gallery-item">
            <img src="..\\images\\salad.jpg" alt="Sample 4" class="circle filter">
            <div class="overlay">Image 4</div>
        </div>

        <div class="gallery-item">
            <img src="..\\images\\soup4.jpg" alt="Sample 5" class="rounded">
            <div class="overlay">Image 5</div>
        </div>

        <div class="gallery-item">
            <img src="..\\images\\wildflower song.jpg" alt="Sample 6" class="circle shadow filter">
            <div class="overlay">Image 6</div>
        </div>
    </section>


</body>
</html>
